# Harbor job config — vix-cc on Terminal-Bench 2.0 (Modal environment)
# Modal uses ~/.modal.toml for auth — run `modal token new` if not set up.
#
# Prerequisites:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   ~/.modal.toml must exist (run: modal token new)

environment:
  type: modal

agents:
  - import_path: "benchmark.agent:ClaudeCodeVix"
    model_name: "claude-haiku-4-5"

datasets:
  - name: "terminal-bench/terminal-bench-2"

n_concurrent: 2
n_attempts: 1
timeout_multiplier: 1.5
agent_setup_timeout_multiplier: 5.0
