# Harbor job config — vix-cc on Terminal-Bench 2.0 (E2B environment)
# E2B builds sandbox templates from Dockerfiles — no private-image quota issues.
#
# Prerequisites:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   export E2B_API_KEY=e2b_...

environment:
  type: e2b

agents:
  - import_path: "benchmark.agent:ClaudeCodeVix"
    model_name: "claude-haiku-4-5"

datasets:
  - name: "terminal-bench/terminal-bench-2"

n_concurrent: 2              # E2B handles concurrency well
n_attempts: 1
timeout_multiplier: 1.5
agent_setup_timeout_multiplier: 5.0
